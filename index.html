<style>
  :root{
    --bg:#14161a; --panel:#1c1f25; --panel2:#22262e; --border:#2e333c;
    --text:#eceef0; --text-dim:#9aa1ab; --text-faint:#6b7280;
    --amber:#e8a33d; --amber-dim:#8a6423;
    --red:#e0605a; --red-bg:#3a2321;
    --green:#5cba7d; --green-bg:#1f3327;
    --blue:#5b9bd5;
    --mono: 'SF Mono', 'Menlo', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  .app{max-width:900px;margin:0 auto;padding:16px 16px 76px;}
  .bottom-bar{position:fixed;left:0;right:0;bottom:0;display:flex;gap:8px;justify-content:center;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--border);z-index:10;}
  .bottom-bar button{flex:1;max-width:200px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  header h1{font-size:19px;font-weight:600;margin:0;letter-spacing:-0.2px;}
  header .sub{font-size:12px;color:var(--text-faint);margin-top:2px;}
  nav{display:flex;gap:4px;overflow-x:auto;margin-bottom:18px;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  nav button{flex:0 0 auto;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);padding:9px 14px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;}
  nav button.active{background:var(--amber);color:#1a1305;border-color:var(--amber);}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
  .card h3{font-size:14px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .row:last-child{border-bottom:none;}
  .label{color:var(--text-dim);}
  .val{font-family:var(--mono);font-weight:500;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .metric{background:var(--panel2);border-radius:8px;padding:10px 12px;}
  .metric .m-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.4px;}
  .metric .m-val{font-family:var(--mono);font-size:19px;font-weight:600;margin-top:2px;}
  .metric .m-val.pos{color:var(--green);}
  .metric .m-val.neg{color:var(--red);}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-size:14px;font-family:var(--sans);margin-bottom:8px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);}
  textarea{resize:vertical;min-height:56px;}
  label.field{font-size:11px;color:var(--text-faint);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.3px;}
  button.primary{width:100%;background:var(--amber);color:#1a1305;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;margin-top:4px;}
  button.ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:8px;font-size:12px;}
  button.danger{background:transparent;border:1px solid var(--red);color:var(--red);padding:5px 10px;border-radius:6px;font-size:11px;}
  .badge{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
  .badge.overdue{background:var(--red-bg);color:var(--red);}
  .badge.soon{background:#3a3221;color:var(--amber);}
  .badge.ok{background:var(--green-bg);color:var(--green);}
  .vehicle-pick{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;}
  .vehicle-pick button{flex:0 0 auto;background:var(--panel2);border:1px solid var(--border);color:var(--text-dim);padding:7px 12px;border-radius:8px;font-size:12px;}
  .vehicle-pick button.active{border-color:var(--amber);color:var(--amber);}
  .empty{text-align:center;color:var(--text-faint);font-size:13px;padding:24px 10px;}
  .toggle-form{overflow:hidden;max-height:0;transition:max-height .25s ease;}
  .toggle-form.open{max-height:1200px;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  .section-btn{background:transparent;border:none;color:var(--amber);font-size:12px;font-weight:600;padding:0;}
  .hist-item{padding:8px 0;border-bottom:1px solid var(--border);}
  .hist-item:last-child{border-bottom:none;}
  .hist-top{display:flex;justify-content:space-between;font-size:13px;}
  .hist-meta{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .notes-box{background:var(--panel2);border-left:2px solid var(--amber);padding:8px 10px;border-radius:6px;font-size:12px;color:var(--text-dim);margin-top:8px;white-space:pre-wrap;}
  .interval-row{display:grid;grid-template-columns:1fr 90px 90px;gap:6px;align-items:center;margin-bottom:6px;}
  .interval-row span{font-size:12px;color:var(--text-dim);}
  .interval-row input{margin-bottom:0;}
  .loading{text-align:center;color:var(--text-faint);font-size:13px;padding:40px 10px;}
  .collapse-toggle{cursor:pointer;user-select:none;}
  .chip{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:var(--panel2);color:var(--text-dim);margin-right:4px;}
  .chip.warn{background:#3a3221;color:var(--amber);}
  .chip.bad{background:var(--red-bg);color:var(--red);}
  .due-list-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
  .due-list-item:last-child{border-bottom:none;}
  .file-drop{border:1px dashed var(--border);border-radius:8px;padding:16px;text-align:center;color:var(--text-faint);font-size:12px;margin-bottom:8px;}
  table.csv-preview{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px;}
  table.csv-preview th,table.csv-preview td{padding:6px 4px;border-bottom:1px solid var(--border);text-align:left;}
  table.csv-preview th{color:var(--text-faint);text-transform:uppercase;font-size:10px;}
</style>

<body>
<div class="app">
<h2 class="sr-only">Turo fleet operations dashboard for tracking maintenance history, upcoming service, vehicle notes, cohost financials, fleet financials, and profit.</h2>
<header>
  <div>
    <h1>Turo ops</h1>
    <div class="sub" id="fleet-sub">loading fleet...</div>
  </div>
</header>
<div id="backup-banner" style="display:none;padding:8px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;"></div>

</div>
<div class="bottom-bar">
  <button class="ghost" id="backup-btn">Backup</button>
  <button class="ghost" id="restore-btn">Restore</button>
  <input type="file" id="restore-file" accept=".json" style="display:none;">

<!-- Firebase (Firestore + Auth) SDK — compat build, no build step required -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
const TABS = [
  {id:'upcoming', label:'Upcoming'},
  {id:'maintenance', label:'Maintenance log'},
  {id:'vehicles', label:'Vehicles'},
  {id:'profit', label:'Profit'},
  {id:'cohost', label:'Cohost financials'},
  {id:'fleet', label:'Fleet financials'}
];
let state = { vehicles: [], maintenance: [], cohostFin: [], fleetFin: [], profit: [], recurring: [] };
let activeTab = 'upcoming';
let selectedVehicleId = null;
let editingMaintId = null;
let editingCohostId = null;
let editingFleetId = null;
let editingVehicleId = null;
let editingProfitId = null;
let collapsedVehicles = new Set();
let csvRows = null;
let csvHeaders = null;
let expenseCsvRows = null;
let expenseCsvHeaders = null;
let expenseCsvPreview = null;

const EXPENSE_CATEGORIES = ['fuel','cleaning','tolls','parking','insurance','maintenance','other','payroll'];

const MAINT_TYPES = ['Oil change','Tire rotation','Tire replacement','Brakes','Battery','Registration','Inspection','Cleaning/detail','Windshield/glass','Other'];
const DEFAULT_INTERVALS = { 'Oil change':{mi:5000,days:120}, 'Tire rotation':{mi:6000,days:180}, 'Tire replacement':{mi:40000,days:1095}, 'Brakes':{mi:25000,days:730}, 'Battery':{mi:0,days:1095}, 'Registration':{mi:0,days:365}, 'Inspection':{mi:0,days:365}, 'Cleaning/detail':{mi:0,days:30}, 'Windshield/glass':{mi:0,days:0}, 'Other':{mi:0,days:0} };

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtMoney(n){ return '$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ if(!d) return '—'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function intervalFor(v, type){
  if(v.intervals && v.intervals[type] && (v.intervals[type].mi || v.intervals[type].days)) return v.intervals[type];
  return DEFAULT_INTERVALS[type];
}

/* ============================================================================
   PERSISTENCE LAYER — Firestore (source of truth) + localStorage (offline
   fallback / instant-paint cache), with a live onSnapshot listener so edits
   made on another device show up here automatically.

   Design:
   - On boot we paint instantly from whatever is in localStorage (or empty
     state on a fresh install), so the app is never blocked on a network call.
   - If firebase-config.js has real (non-placeholder) values, we open a
     Firestore document at turoOps/state and attach a live listener.
   - Every mutation still calls save('vehicles') / save('maintenance') / etc,
     exactly like the old window.storage-based version, so none of the
     render/handler code below had to change. save() writes to localStorage
     first (always succeeds, instant) and then merges that one field into the
     Firestore doc (best-effort, may be offline).
   - Firestore's own offline persistence (enablePersistence) is also turned
     on as a second safety net beneath localStorage.
   ============================================================================ */

const LS_PREFIX = 'turo-ops:';
const DATA_KEYS = ['vehicles','maintenance','cohostFin','fleetFin','profit','recurring'];

const hasCloudConfig = !!(window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey && !String(window.FIREBASE_CONFIG.apiKey).startsWith('REPLACE_WITH'));
let db = null;
let docRef = null;
let cloudStatus = hasCloudConfig ? 'unknown' : 'no-config'; // 'unknown' | 'ok' | 'unavailable' | 'no-config'
let cloudSeeded = false;
let pendingRenderFromCloud = false;

if(hasCloudConfig){
  try{
    firebase.initializeApp(window.FIREBASE_CONFIG);
    db = firebase.firestore();
    try{ db.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    const path = window.FIREBASE_DOC_PATH || {collection:'turoOps', docId:'state'};
    docRef = db.collection(path.collection).doc(path.docId);
  }catch(e){
    console.warn('Firebase init failed, falling back to local-only storage', e);
    cloudStatus = 'unavailable';
    db = null; docRef = null;
  }
}

function isFormFieldActive(){
  const ae = document.activeElement;
  return !!(ae && ['INPUT','SELECT','TEXTAREA'].includes(ae.tagName));
}

function loadLocalCache(){
  for(const k of DATA_KEYS){
    try{ state[k] = JSON.parse(localStorage.getItem(LS_PREFIX+k) || '[]'); }catch(e){ state[k] = []; }
  }
  let lastVid = null;
  try{ lastVid = JSON.parse(localStorage.getItem(LS_PREFIX+'lastVehicleId') || 'null'); }catch(e){}
  if(lastVid && state.vehicles.some(v=>v.id===lastVid)) selectedVehicleId = lastVid;
  else if(!selectedVehicleId && state.vehicles.length) selectedVehicleId = state.vehicles[0].id;
}
function persistLocalCache(key){
  const keys = key ? [key] : DATA_KEYS;
  for(const k of keys){
    try{ localStorage.setItem(LS_PREFIX+k, JSON.stringify(state[k]||[])); }catch(e){}
  }
}

function mergeCloudSnapshot(data){
  if(!data) return;
  for(const k of DATA_KEYS){
    if(Array.isArray(data[k])) state[k] = data[k];
  }
  if(data.lastVehicleId && (!selectedVehicleId || !state.vehicles.some(v=>v.id===selectedVehicleId))){
    if(state.vehicles.some(v=>v.id===data.lastVehicleId)) selectedVehicleId = data.lastVehicleId;
  }
  persistLocalCache();
}

async function pushFullStateToCloud(){
  if(!hasCloudConfig || !docRef) return;
  try{
    const payload = {};
    for(const k of DATA_KEYS) payload[k] = state[k]||[];
    payload.lastVehicleId = selectedVehicleId || null;
    payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
    await docRef.set(payload, {merge:true});
    cloudStatus = 'ok';
  }catch(e){
    console.warn('Could not seed Firestore doc', e);
    cloudStatus = 'unavailable';
  }
}

let cloudListenerAttached = false;
function attachCloudListener(){
  if(!hasCloudConfig || !docRef || cloudListenerAttached) return;
  cloudListenerAttached = true;
  docRef.onSnapshot({includeMetadataChanges:true}, (snap) => {
    cloudStatus = 'ok';
    if(snap.metadata.hasPendingWrites){
      // This is the echo of our own write coming back — local state already
      // reflects it, so there's nothing new to merge.
      return;
    }
    if(snap.exists){
      mergeCloudSnapshot(snap.data());
    } else if(!cloudSeeded){
      // Brand-new Firestore doc (first time this project has been used) —
      // seed it with whatever we already have locally on this device.
      pushFullStateToCloud();
    }
    cloudSeeded = true;
    if(isFormFieldActive()){
      // Don't yank focus / clobber an in-progress edit. We'll catch up once
      // the user leaves the field (see focusout listener below).
      pendingRenderFromCloud = true;
    } else {
      render();
    }
  }, (err) => {
    console.warn('Firestore listener error', err);
    cloudStatus = 'unavailable';
    render();
  });
}

document.addEventListener('focusout', () => {
  if(pendingRenderFromCloud){
    pendingRenderFromCloud = false;
    setTimeout(render, 50);
  }
});

async function loadAll(){
  loadLocalCache();
  render(); // paint instantly, never block the UI on a network round-trip
  initCloudAuthThenListen();
}

function initCloudAuthThenListen(){
  if(!hasCloudConfig || !docRef) return;

  // If the Auth SDK isn't available for some reason (e.g. script failed to
  // load), fall back to attaching directly. This only works if the
  // Firestore rules don't require request.auth != null (i.e. still on
  // test-mode rules) — under the locked rules it'll just fail closed and
  // fall back to local-only, same as any other offline scenario.
  if(typeof firebase.auth !== 'function'){
    attachCloudListener();
    return;
  }

  firebase.auth().onAuthStateChanged((user) => {
    if(user) attachCloudListener();
  });
  firebase.auth().signInAnonymously().catch((err) => {
    console.warn('Anonymous sign-in failed, falling back to local-only storage', err);
    cloudStatus = 'unavailable';
    render();
  });
}

async function save(key){
  persistLocalCache(key);
  if(hasCloudConfig && docRef){
    try{
      await docRef.set({ [key]: state[key]||[], updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, {merge:true});
      cloudStatus = 'ok';
    }catch(e){
      console.warn('Firestore write failed, data is safe in localStorage', e);
      cloudStatus = 'unavailable';
    }
  }
  render();
}

async function rememberVehicle(id){
  selectedVehicleId = id;
  try{ localStorage.setItem(LS_PREFIX+'lastVehicleId', JSON.stringify(id)); }catch(e){}
  if(hasCloudConfig && docRef){
    try{ await docRef.set({ lastVehicleId: id }, {merge:true}); }catch(e){}
  }
}
function vehicleTotalSpent(vid){
  return state.maintenance.filter(m=>m.vehicleId===vid).reduce((s,m)=>s+(m.cost||0),0);
}
function expiryStatus(dateStr){
  if(!dateStr) return null;
  const days = daysBetween(new Date().toISOString().slice(0,10), dateStr);
  if(days<=0) return 'bad';
  if(days<=30) return 'warn';
  return 'ok';
}
function fleetDueDates(){
  const items = [];
  for(const v of state.vehicles){
    const due = nextDue(v).filter(d=>d.type==='Registration'||d.type==='Inspection');
    for(const d of due){ if(d.dueDate) items.push({vehicle:v.name, label:d.type, date:d.dueDate, status:d.status}); }
    if(v.warrantyExpiration) items.push({vehicle:v.name, label:'Warranty expires', date:v.warrantyExpiration, status:expiryStatus(v.warrantyExpiration)||'ok'});
    if(v.insuranceRenewal) items.push({vehicle:v.name, label:'Insurance renewal', date:v.insuranceRenewal, status:expiryStatus(v.insuranceRenewal)||'ok'});
  }
  return items.sort((a,b)=>a.date.localeCompare(b.date));
}
function parseCSV(text){
  // Quote-aware CSV parser. Walks the raw text character-by-character and
  // only treats a newline as a row separator when it's OUTSIDE a quoted
  // field. This matters for real-world exports like Turo's own CSV, whose
  // "Type" column can contain a literal embedded newline inside quotes
  // (e.g. `"Sam's trip\n"`) — splitting on \r?\n up front (the old approach)
  // chops that single logical row into two, shifting every field after it.
  const rows = [];
  let row = [];
  let cur = '';
  let inQ = false;
  let i = 0;
  const len = text.length;
  while(i < len){
    const c = text[i];
    if(inQ){
      if(c === '"'){
        if(text[i+1] === '"'){ cur += '"'; i += 2; continue; }
        inQ = false; i++; continue;
      }
      cur += c; i++; continue;
    } else {
      if(c === '"'){ inQ = true; i++; continue; }
      if(c === ','){ row.push(cur); cur=''; i++; continue; }
      if(c === '\r'){ i++; continue; }
      if(c === '\n'){ row.push(cur); cur=''; rows.push(row); row=[]; i++; continue; }
      cur += c; i++; continue;
    }
  }
  // Last field/row (file may or may not end with a trailing newline).
  if(cur !== '' || row.length){ row.push(cur); rows.push(row); }

  const cleaned = rows
    .map(r => r.map(s => s.trim()))
    .filter(r => !(r.length===1 && r[0]===''));
  if(!cleaned.length) return {headers:[], rows:[]};

  const headers = cleaned[0];
  const dataRows = cleaned.slice(1).map(cells=>{
    const obj = {};
    headers.forEach((h,i)=>obj[h]=cells[i]||'');
    return obj;
  });
  return {headers, rows: dataRows};
}
// Parses a currency-ish string into a number. Handles a leading/trailing
// currency symbol and, importantly, Turo's (and many bank statements')
// accounting-style parentheses for negative amounts, e.g. "($124.20)" for
// a refund/adjustment or "($100.00)" for a "Host no show fee" line item —
// naively stripping non-numeric characters loses the parens and silently
// turns these positive.
function parseMoney(str){
  if(str == null) return NaN;
  const s = String(str).trim();
  if(!s) return NaN;
  const isParenNegative = /^\(.*\)$/.test(s);
  const cleaned = s.replace(/[()]/g,'').replace(/[^0-9.\-]/g,'');
  if(cleaned === '' || cleaned === '-' || cleaned === '.') return NaN;
  let n = parseFloat(cleaned);
  if(isNaN(n)) return NaN;
  if(isParenNegative && n > 0) n = -n;
  return n;
}
function findCol(headers, keywords){
  const lower = headers.map(h=>h.toLowerCase());
  for(const kw of keywords){
    const idx = lower.findIndex(h=>h.includes(kw));
    if(idx>-1) return headers[idx];
  }
  return null;
}
function csvToMonthlySummary(headers, rows){
  const vehicleCol = findCol(headers, ['vehicle','car']);
  const earningsCol = findCol(headers, ['trip earnings','earnings','payout','total']);
  const dateCol = findCol(headers, ['start date','trip date','date']);
  if(!earningsCol || !dateCol) return null;
  const groups = {};
  for(const r of rows){
    const dateVal = r[dateCol];
    if(!dateVal) continue;
    const d = new Date(dateVal);
    if(isNaN(d)) continue;
    const month = d.toISOString().slice(0,7);
    const vehicle = vehicleCol ? (r[vehicleCol]||'Unknown') : 'All';
    const amt = parseMoney(r[earningsCol])||0;
    const key = month+'|'+vehicle;
    if(!groups[key]) groups[key] = {month, vehicle, total:0, count:0};
    groups[key].total += amt;
    groups[key].count += 1;
  }
  return Object.values(groups).sort((a,b)=>b.month.localeCompare(a.month));
}

/* ---- Expense CSV import (bank / credit card statements) ----
   Generic parser: looks for a date column, a description/merchant column,
   and an amount (either a single "Amount" column, or separate Debit/Credit
   columns like many bank exports use). Each row gets a best-guess
   EXPENSE_CATEGORIES value from merchant/description keywords, which the
   user can override in the preview table before confirming. */
const EXPENSE_CATEGORY_KEYWORDS = {
  fuel: ['shell','chevron','exxon','exxonmobil','mobil','arco',' bp ','76 ','circle k','circlek','speedway','sunoco','marathon','texaco','valero','costco gas','wawa','quiktrip',' qt ','pilot travel','flying j','gas station','fuel','conoco','phillips 66','citgo'],
  cleaning: ['carwash','car wash','autospa','auto spa','detailing','mister car wash','zips car wash'],
  tolls: ['toll','ezpass','e-zpass','sunpass','fastrak','tollway','turnpike','tollroad','ipass'],
  parking: ['parking','parkmobile','park mobile','spothero','airport parking','parking garage','ampco'],
  insurance: ['insurance','geico','progressive','allstate','state farm','liberty mutual','farmers insurance','nationwide ins','usaa','root insurance','turo insurance'],

function guessExpenseCategory(desc){
  const d = (desc||'').toLowerCase();
  for(const cat of Object.keys(EXPENSE_CATEGORY_KEYWORDS)){
    if(EXPENSE_CATEGORY_KEYWORDS[cat].some(kw=>d.includes(kw))) return cat;
  }
  return 'payroll';
}
const NON_EXPENSE_KEYWORDS = ['payment received','autopay','auto-pay','thank you','online payment','ach payment','card payment','mobile payment','deposit','transfer to','transfer from','direct deposit','refund','credit balance','cash back redemption'];
function parseExpenseCSV(headers, rows){
  const dateCol = findCol(headers, ['transaction date','trans date','posted date','post date','date']);
  const descCol = findCol(headers, ['description','merchant','payee','memo','name','transaction']);
  const debitCol = findCol(headers, ['debit','withdrawal']);
  const creditCol = findCol(headers, ['credit','deposit']);
  const amountCol = findCol(headers, ['amount']);
  if(!dateCol || (!debitCol && !amountCol && !creditCol)) return null;
  const out = [];
  for(const r of rows){
    const dateVal = r[dateCol];
    if(!dateVal) continue;
    const d = new Date(dateVal);
    if(isNaN(d)) continue;
    const desc = descCol ? (r[descCol]||'').trim() : '';

    const debitVal = debitCol ? parseMoney(r[debitCol]) : NaN;
    const creditVal = creditCol ? parseMoney(r[creditCol]) : NaN;
    const genericVal = amountCol ? parseMoney(r[amountCol]) : NaN;

    let amount = 0;
    let looksLikeCredit = false;
    if(!isNaN(debitVal) && debitVal){
      amount = Math.abs(debitVal);
    } else if(!isNaN(creditVal) && creditVal){
      // Separate credit column with a value means money came IN (a deposit
      // or payment), not an expense — flag it so it's unchecked by default.
      amount = Math.abs(creditVal);
      looksLikeCredit = true;
    } else if(!isNaN(genericVal) && genericVal){
      amount = Math.abs(genericVal);
    } else {
      continue;
    }
    if(!amount) continue;

    const descLower = desc.toLowerCase();
    const flaggedNonExpense = looksLikeCredit || NON_EXPENSE_KEYWORDS.some(kw=>descLower.includes(kw));

    out.push({
      rowId: uid(),
      date: d.toISOString().slice(0,10),
      description: desc || '(no description)',
      amount: Math.round(amount*100)/100,
      category: guessExpenseCategory(desc),
      vehicleId: null,
      include: !flaggedNonExpense
    });
  }
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}

async function downloadBackup(){
  const filename = 'turo-ops-backup-'+new Date().toISOString().slice(0,10)+'.json';
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  let shared = false;
  if(navigator.canShare){
    try{
      const file = new File([blob], filename, {type:'application/json'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'Turo ops backup'});
        shared = true;
      }
    }catch(e){ }
  }
  if(!shared){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  try{ localStorage.setItem(LS_PREFIX+'lastBackup', new Date().toISOString()); }catch(e){}
  render();
}
async function restoreBackup(file){
  const text = await file.text();
  let parsed;
  try{ parsed = JSON.parse(text); }catch(e){ alert('That file isn\'t valid backup JSON.'); return; }
  const keys = ['vehicles','maintenance','cohostFin','fleetFin','profit','recurring'];
  const found = keys.filter(k=>Array.isArray(parsed[k]));
  if(!found.length){ alert('No recognizable data found in that file.'); return; }
  if(!confirm('This will replace your current data with the backup ('+found.map(k=>k+': '+parsed[k].length).join(', ')+'). Continue?')) return;
  for(const k of keys){
    state[k] = Array.isArray(parsed[k]) ? parsed[k] : [];
    await save(k);
  }
  try{ localStorage.setItem(LS_PREFIX+'lastBackup', new Date().toISOString()); }catch(e){}
  selectedVehicleId = state.vehicles.length ? state.vehicles[0].id : null;
  alert('Restored. Your data is back.');
  render();
}
function lastBackupDaysAgo(){
  try{
    const raw = localStorage.getItem(LS_PREFIX+'lastBackup');
    if(!raw) return null;
    return daysBetween(raw.slice(0,10), new Date().toISOString().slice(0,10));
  }catch(e){ return null; }
}

function nextDue(v){
  const logs = state.maintenance.filter(m=>m.vehicleId===v.id);
  const results = [];
  for(const type of MAINT_TYPES){
    const interval = intervalFor(v, type);
    if(!interval || (!interval.mi && !interval.days)) continue;
    const last = logs.filter(m=>m.type===type).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    if(!last) continue;
    let dueMi=null, dueDate=null;
    if(interval.mi) dueMi = last.mileage + interval.mi;
    if(interval.days) dueDate = new Date(new Date(last.date).getTime()+interval.days*86400000).toISOString().slice(0,10);
    const curMi = v.currentMileage||0;
    const miLeft = dueMi!=null ? dueMi-curMi : Infinity;
    const daysLeft = dueDate!=null ? daysBetween(new Date().toISOString().slice(0,10), dueDate) : Infinity;
    const status = (miLeft<=0||daysLeft<=0) ? 'overdue' : (miLeft<=500||daysLeft<=14) ? 'soon' : 'ok';
    results.push({type, dueMi, dueDate, miLeft, daysLeft, status, last});
  }
  return results.sort((a,b)=>{
    const order={overdue:0,soon:1,ok:2};
    return order[a.status]-order[b.status];
  });
}

function render(){
  document.getElementById('fleet-sub').textContent = state.vehicles.length + ' vehicle' + (state.vehicles.length!==1?'s':'') + ' in fleet';
  const daysSince = lastBackupDaysAgo();
  const banner = document.getElementById('backup-banner');
  if(banner){
    if(cloudStatus==='ok'){
      banner.style.display='none';
    } else if(cloudStatus==='no-config'){
      banner.style.display='block'; banner.className='card'; banner.style.fontSize='12px';
      banner.style.borderColor='var(--amber)'; banner.style.color='var(--amber)';
      banner.textContent = "Cloud sync isn't set up yet - paste your project's values into firebase-config.js to sync across devices. Your data is saved on this device only for now" + (daysSince!==null ? (', last backup: '+daysSince+' days ago') : '') + '.';
    } else if(cloudStatus==='unavailable' && state.vehicles.length){
      banner.style.display='block'; banner.className='card'; banner.style.fontSize='12px';
      banner.style.borderColor='var(--red)'; banner.style.color='var(--red)';
      banner.textContent = "Cloud sync isn't working right now - your data is only saved on this device. Tap Backup below regularly" + (daysSince!==null ? (' (last one: '+daysSince+' days ago)') : '') + '.';
    } else {
      banner.style.display='none';
    }
  }
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = TABS.map(t=>`<button class="${t.id===activeTab?'active':''}" data-tab="${t.id}">${t.label}</button>`).join('');
  tabsEl.querySelectorAll('button').forEach(b=>b.onclick=()=>{ activeTab=b.dataset.tab; render(); });

  const content = document.getElementById('content');
  if(activeTab==='upcoming') content.innerHTML = renderUpcoming();
  else if(activeTab==='maintenance') content.innerHTML = renderMaintenance();
  else if(activeTab==='vehicles') content.innerHTML = renderVehicles();
  else if(activeTab==='profit') content.innerHTML = renderProfit();
  else if(activeTab==='cohost') content.innerHTML = renderCohost();
  else if(activeTab==='fleet') content.innerHTML = renderFleetFin();
  attachHandlers();
}

function cohostSummaryText(cohostName){
  const rows = state.cohostFin.filter(r=>r.cohostName===cohostName).sort((a,b)=>b.month.localeCompare(a.month));
  if(!rows.length) return 'No months logged yet for '+cohostName+'.';
  const vehicleName = id => (state.vehicles.find(v=>v.id===id)||{}).name || '';
  let out = 'Turo cohost summary for '+cohostName+'\n';
  for(const r of rows){
    const net = r.revenue - r.expenses;
    const share = net * (r.split/100);
    out += `\n${r.month}${r.vehicleId?' ('+vehicleName(r.vehicleId)+')':''}\nRevenue: ${fmtMoney(r.revenue)}\nExpenses: ${fmtMoney(r.expenses)}\nNet: ${fmtMoney(net)}\n${cohostName}'s share (${r.split}%): ${fmtMoney(share)}\n`;
  }
  return out;
}
function fleetSummaryText(){
  const rows = state.fleetFin.sort((a,b)=>b.month.localeCompare(a.month));
  if(!rows.length) return 'No fleet months logged yet.';
  let out = 'Turo fleet financials\n';
  for(const r of rows){
    const totalExp = (r.maint||0)+(r.fees||0)+(r.other||0)+(r.cohostPayout||0);
    const net = r.revenue - totalExp;
    out += `\n${r.month}\nRevenue: ${fmtMoney(r.revenue)}\nMaintenance: ${fmtMoney(r.maint)}\nInsurance/fees: ${fmtMoney(r.fees)}\nOther: ${fmtMoney(r.other)}\nCohost payout: ${fmtMoney(r.cohostPayout)}\nNet profit: ${fmtMoney(net)}\n`;
  }
  return out;
}
async function shareOrCopy(text, title){
  if(navigator.share){
    try{ await navigator.share({ text, title }); return; }catch(e){}
  }
  try{
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard');
  }catch(e){
    alert(text);
  }
}

function attachHandlers(){
  const backupBtn = document.getElementById('backup-btn');
  if(backupBtn) backupBtn.onclick = downloadBackup;
  const restoreBtn = document.getElementById('restore-btn');
  const restoreFile = document.getElementById('restore-file');
  if(restoreBtn && restoreFile){
    restoreBtn.onclick = () => restoreFile.click();
    restoreFile.onchange = (e) => {
      const file = e.target.files[0];
      if(file) restoreBackup(file);
      e.target.value = '';
    };
  }
  document.querySelectorAll('[data-collapse]').forEach(el=>el.onclick=(e)=>{
    if(e.target.closest('button')) return;
    const id = el.dataset.collapse;
    if(collapsedVehicles.has(id)) collapsedVehicles.delete(id); else collapsedVehicles.add(id);
    render();
  });
  const expCohost = document.getElementById('export-cohost');
  if(expCohost) expCohost.onclick = () => {
    const pick = document.getElementById('export-cohost-pick');
    const name = pick ? pick.value : '';
    shareOrCopy(cohostSummaryText(name), name+' summary');
  };
  const expFleet = document.getElementById('export-fleet');
  if(expFleet) expFleet.onclick = () => shareOrCopy(fleetSummaryText(), 'Fleet financials');

  const toggleMaintBtn = document.getElementById('toggle-maint-form');
  if(toggleMaintBtn) toggleMaintBtn.onclick = () => {
    if(editingMaintId){ editingMaintId = null; render(); }
    else document.getElementById('maint-form').classList.toggle('open');
  };
  const toggleVehBtn = document.getElementById('toggle-veh-form');
  if(toggleVehBtn) toggleVehBtn.onclick = () => {
    if(editingVehicleId){ editingVehicleId = null; render(); }
    else document.getElementById('veh-form').classList.toggle('open');
  };
  document.querySelectorAll('[data-edit-vehicle]').forEach(b=>b.onclick=()=>{ editingVehicleId = b.dataset.editVehicle; render(); });
  const toggleCohostBtn = document.getElementById('toggle-cohost-form');
  if(toggleCohostBtn) toggleCohostBtn.onclick = () => {
    if(editingCohostId){ editingCohostId = null; render(); }
    else document.getElementById('cohost-form').classList.toggle('open');
  };
  const toggleFleetBtn = document.getElementById('toggle-fleet-form');
  if(toggleFleetBtn) toggleFleetBtn.onclick = () => {
    if(editingFleetId){ editingFleetId = null; render(); }
    else document.getElementById('fleet-form').classList.toggle('open');
  };
  const toggleProfitBtn = document.getElementById('toggle-profit-form');
  if(toggleProfitBtn) toggleProfitBtn.onclick = () => {
    if(editingProfitId){ editingProfitId = null; render(); }
    else document.getElementById('profit-form').classList.toggle('open');
  };
  document.querySelectorAll('[data-edit-cohost]').forEach(b=>b.onclick=()=>{ editingCohostId = b.dataset.editCohost; render(); });
  document.querySelectorAll('[data-edit-fleet]').forEach(b=>b.onclick=()=>{ editingFleetId = b.dataset.editFleet; render(); });
  document.querySelectorAll('[data-edit-profit]').forEach(b=>b.onclick=()=>{ editingProfitId = b.dataset.editProfit; render(); });

  document.querySelectorAll('[data-vid]').forEach(b=>b.onclick=async()=>{ await rememberVehicle(b.dataset.vid); render(); });

  document.querySelectorAll('[data-quick-mi]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.quickMi; const input=document.getElementById('quick-mi-'+id);
    const val=Number(input.value); if(!val) return;
    const v=state.vehicles.find(x=>x.id===id); v.currentMileage=val;
    await save('vehicles'); render();
  });

  const saveVehicle = document.getElementById('save-vehicle');
  if(saveVehicle) saveVehicle.onclick = async () => {
    const name = document.getElementById('v-name').value.trim();
    if(!name) return;
    const intervalTypes = MAINT_TYPES.filter(t=>DEFAULT_INTERVALS[t].mi || DEFAULT_INTERVALS[t].days);
    const intervals = {};
    for(const t of intervalTypes){
      const key = t.replace(/[^a-zA-Z0-9]/g,'');
      const mi = Number(document.getElementById('vi-mi-'+key).value)||0;
      const days = Number(document.getElementById('vi-days-'+key).value)||0;
      if(mi||days) intervals[t] = {mi, days};
    }
    const record = { name, vin:document.getElementById('v-vin').value.trim(), currentMileage:Number(document.getElementById('v-mileage').value)||0, listing:document.getElementById('v-listing').value.trim(), notes:document.getElementById('v-notes').value.trim(), warrantyExpiration:document.getElementById('v-warranty').value||null, insuranceRenewal:document.getElementById('v-insurance').value||null, intervals };
    if(editingVehicleId){
      const idx = state.vehicles.findIndex(v=>v.id===editingVehicleId);
      if(idx>-1) state.vehicles[idx] = {...state.vehicles[idx], ...record};
      editingVehicleId = null;
    } else {
      state.vehicles.push({ id:uid(), ...record });
    }
    await save('vehicles'); render();
  };
  document.querySelectorAll('[data-del-vehicle]').forEach(b=>b.onclick=async()=>{
    state.vehicles = state.vehicles.filter(v=>v.id!==b.dataset.delVehicle);
    await save('vehicles'); render();
  });
  document.querySelectorAll('[data-update-mi]').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.updateMi; const input=document.getElementById('update-mi-'+id);
    const val=Number(input.value); if(!val) return;
    const v=state.vehicles.find(x=>x.id===id); v.currentMileage=val;
    await save('vehicles'); render();
  });

  const sameAsLast = document.getElementById('same-as-last');
  if(sameAsLast) sameAsLast.onclick = () => {
    const logs = state.maintenance.filter(m=>m.vehicleId===selectedVehicleId).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const last = logs[0];
    if(!last) return;
    document.getElementById('maint-form').classList.add('open');
    document.getElementById('m-type').value = last.type;
    document.getElementById('m-cost').value = last.cost;
    document.getElementById('m-shop').value = last.shop;
  };
  document.querySelectorAll('[data-edit-maint]').forEach(b=>b.onclick=()=>{
    editingMaintId = b.dataset.editMaint; render();
  });

  const saveMaint = document.getElementById('save-maint');
  if(saveMaint) saveMaint.onclick = async () => {
    const v = state.vehicles.find(x=>x.id===selectedVehicleId);
    const mileage = Number(document.getElementById('m-mileage').value)||v.currentMileage||0;
    const record = {
      vehicleId:v.id, type:document.getElementById('m-type').value,
      date:document.getElementById('m-date').value, mileage,
      cost:Number(document.getElementById('m-cost').value)||0,
      shop:document.getElementById('m-shop').value.trim(),
      notes:document.getElementById('m-notes').value.trim()
    };
    if(editingMaintId){
      const idx = state.maintenance.findIndex(m=>m.id===editingMaintId);
      if(idx>-1) state.maintenance[idx] = {...state.maintenance[idx], ...record};
      editingMaintId = null;
    } else {
      state.maintenance.push({ id:uid(), ...record });
    }
    if(mileage > (v.currentMileage||0)) v.currentMileage = mileage;
    await save('maintenance'); await save('vehicles'); render();
  };

  const saveCohost = document.getElementById('save-cohost');
  if(saveCohost) saveCohost.onclick = async () => {
    const month = document.getElementById('c-month').value;
    if(!month) return;
    const record = { month, cohostName:document.getElementById('c-name').value.trim()||'Unnamed', vehicleId:document.getElementById('c-vehicle').value||null, revenue:Number(document.getElementById('c-revenue').value)||0, expenses:Number(document.getElementById('c-expenses').value)||0, split:Number(document.getElementById('c-split').value)||40, paid:document.getElementById('c-paid').value==='yes', paidDate:document.getElementById('c-paid-date').value||null };
    if(editingCohostId){
      const idx = state.cohostFin.findIndex(r=>r.id===editingCohostId);
      if(idx>-1) state.cohostFin[idx] = {...state.cohostFin[idx], ...record};
      editingCohostId = null;
    } else {
      state.cohostFin.push({ id:uid(), ...record });
    }
    await save('cohostFin'); render();
  };
  document.querySelectorAll('[data-del-cohost]').forEach(b=>b.onclick=async()=>{
    state.cohostFin = state.cohostFin.filter(r=>r.id!==b.dataset.delCohost);
    await save('cohostFin'); render();
  });

  const saveFleet = document.getElementById('save-fleet');
  if(saveFleet) saveFleet.onclick = async () => {
    const month = document.getElementById('f-month').value;
    if(!month) return;
    const record = { month, revenue:Number(document.getElementById('f-revenue').value)||0, maint:Number(document.getElementById('f-maint').value)||0, fees:Number(document.getElementById('f-fees').value)||0, other:Number(document.getElementById('f-other').value)||0, cohostPayout:Number(document.getElementById('f-cohost-payout').value)||0 };
    if(editingFleetId){
      const idx = state.fleetFin.findIndex(r=>r.id===editingFleetId);
      if(idx>-1) state.fleetFin[idx] = {...state.fleetFin[idx], ...record};
      editingFleetId = null;
    } else {
      state.fleetFin = state.fleetFin.filter(r=>r.month!==month);
      state.fleetFin.push({ id:uid(), ...record });
    }
    await save('fleetFin'); render();
  };
  document.querySelectorAll('[data-del-fleet]').forEach(b=>b.onclick=async()=>{
    state.fleetFin = state.fleetFin.filter(r=>r.id!==b.dataset.delFleet);
    await save('fleetFin'); render();
  });

  const saveProfit = document.getElementById('save-profit');
  if(saveProfit) saveProfit.onclick = async () => {
    const date = document.getElementById('p-date').value || new Date().toISOString().slice(0,10);
    const record = { date, label:document.getElementById('p-label').value.trim(), vehicleId:document.getElementById('p-vehicle').value||null, revenue:Number(document.getElementById('p-revenue').value)||0, expenses:Number(document.getElementById('p-expenses').value)||0, category:document.getElementById('p-category').value||'other' };
    if(editingProfitId){
      const idx = state.profit.findIndex(r=>r.id===editingProfitId);
      if(idx>-1) state.profit[idx] = {...state.profit[idx], ...record};
      editingProfitId = null;
    } else {
      state.profit.push({ id:uid(), ...record });
    }
    await save('profit'); render();
  };
  document.querySelectorAll('[data-del-profit]').forEach(b=>b.onclick=async()=>{
    state.profit = state.profit.filter(r=>r.id!==b.dataset.delProfit);
    await save('profit'); render();
  });

  const toggleRecurringBtn = document.getElementById('toggle-recurring-form');
  if(toggleRecurringBtn) toggleRecurringBtn.onclick = () => document.getElementById('recurring-form').classList.toggle('open');
  const saveRecurring = document.getElementById('save-recurring');
  if(saveRecurring) saveRecurring.onclick = async () => {
    const name = document.getElementById('r-name').value.trim();
    const amount = Number(document.getElementById('r-amount').value)||0;
    if(!name) return;
    state.recurring.push({ id:uid(), name, amount });
    await save('recurring'); render();
  };
  document.querySelectorAll('[data-del-recurring]').forEach(b=>b.onclick=async()=>{
    state.recurring = state.recurring.filter(r=>r.id!==b.dataset.delRecurring);
    await save('recurring'); render();
  });
  document.querySelectorAll('[data-quickadd-recurring]').forEach(b=>b.onclick=async()=>{
    const item = state.recurring.find(r=>r.id===b.dataset.quickaddRecurring);
    if(!item) return;
    state.profit.push({ id:uid(), date:new Date().toISOString().slice(0,10), label:item.name, vehicleId:null, revenue:0, expenses:item.amount, category:'other' });
    await save('profit'); render();
  });

  const toggleCsvBtn = document.getElementById('toggle-csv-form');
  if(toggleCsvBtn) toggleCsvBtn.onclick = () => {
    if(csvRows){ csvRows=null; csvHeaders=null; render(); }
    else document.getElementById('csv-form').classList.toggle('open');
  };
  const csvFile = document.getElementById('csv-file');
  if(csvFile) csvFile.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    const parsed = parseCSV(text);
    csvHeaders = parsed.headers; csvRows = parsed.rows;
    render();
  };
  document.querySelectorAll('[data-csv-add]').forEach(b=>b.onclick=async()=>{
    const summary = csvToMonthlySummary(csvHeaders, csvRows);
    const g = summary[Number(b.dataset.csvAdd)];
    if(!g) return;
    const matchedVehicle = state.vehicles.find(v=>v.name.toLowerCase()===g.vehicle.toLowerCase());
    state.profit.push({ id:uid(), date:g.month+'-01', label:'Turo import: '+g.vehicle, vehicleId:matchedVehicle?matchedVehicle.id:null, revenue:g.total, expenses:0, category:'other' });
    await save('profit');
    alert('Added '+fmtMoney(g.total)+' for '+g.vehicle+' ('+g.month+') as a profit entry.');
    render();
  });

  const toggleExpenseCsvBtn = document.getElementById('toggle-expense-csv-form');
  if(toggleExpenseCsvBtn) toggleExpenseCsvBtn.onclick = () => {
    if(expenseCsvRows){ expenseCsvRows=null; expenseCsvHeaders=null; expenseCsvPreview=null; render(); }
    else document.getElementById('expense-csv-form').classList.toggle('open');
  };
  const expenseCsvFile = document.getElementById('expense-csv-file');
  if(expenseCsvFile) expenseCsvFile.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const text = await file.text();
    const parsed = parseCSV(text);
    expenseCsvHeaders = parsed.headers; expenseCsvRows = parsed.rows;
    expenseCsvPreview = parseExpenseCSV(expenseCsvHeaders, expenseCsvRows);
    render();
  };
  document.querySelectorAll('[data-expense-include]').forEach(cb=>cb.onchange=()=>{
    const row = expenseCsvPreview && expenseCsvPreview.find(r=>r.rowId===cb.dataset.expenseInclude);
    if(row) row.include = cb.checked;
    render();
  });
  document.querySelectorAll('[data-expense-category]').forEach(sel=>sel.onchange=()=>{
    const row = expenseCsvPreview && expenseCsvPreview.find(r=>r.rowId===sel.dataset.expenseCategory);
    if(row) row.category = sel.value;
  });
  document.querySelectorAll('[data-expense-vehicle]').forEach(sel=>sel.onchange=()=>{
    const row = expenseCsvPreview && expenseCsvPreview.find(r=>r.rowId===sel.dataset.expenseVehicle);
    if(row) row.vehicleId = sel.value||null;
  });
  const confirmExpenseCsv = document.getElementById('confirm-expense-csv');
  if(confirmExpenseCsv) confirmExpenseCsv.onclick = async () => {
    confirmExpenseCsv.disabled = true;
    confirmExpenseCsv.textContent = 'Adding...';
    const toAdd = expenseCsvPreview.filter(r=>r.include);
    for(const row of toAdd){
      state.profit.push({ id:uid(), date:row.date, label:row.description, vehicleId:row.vehicleId||null, revenue:0, expenses:row.amount, category:row.category||'other' });
    }
    expenseCsvRows = null; expenseCsvHeaders = null; expenseCsvPreview = null;
    await save('profit');
    alert('Added '+toAdd.length+' expense'+(toAdd.length!==1?'s':'')+' as profit entries.');
    render();
  };

  const exportProfitCsv = document.getElementById('export-profit-csv');
  if(exportProfitCsv) exportProfitCsv.onclick = () => {
    const vehicleName = id => (state.vehicles.find(v=>v.id===id)||{}).name || '';
    let csv = 'Date,Label,Vehicle,Revenue,Expenses,Category,Net\n';
    for(const r of state.profit.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''))){
      const net = (r.revenue||0)-(r.expenses||0);
      csv += `${r.date},"${(r.label||'').replace(/"/g,'""')}","${vehicleName(r.vehicleId)}",${r.revenue||0},${r.expenses||0},${r.category||'other'},${net}\n`;
    }
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'turo-profit-'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };
}

loadAll();
</script>

<script>
// Register the PWA service worker (app-shell caching for offline reliability).
// Safe no-op if the browser doesn't support it or sw.js isn't reachable.
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
